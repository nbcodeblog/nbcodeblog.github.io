<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This Page is About HTML Links">
    <meta name="keywords" content="HTML">
    <meta name="author" content="Nitin Bhardwaj">
    <meta name="robots" content="index, follow">
    <title>HTML Links</title>
    <link rel="shortcut icon" href="/Assets/favicon.ico" type="image/x-icon">
    <style>
        .buttonlink1{
            color: black;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>HTML Links</h1>
    <a href="https://nbcodeblog.github.io" target="_blank">nbcodeblog</a>
    <h2>Relative URL Link</h2>
    <a href="/HTML_New/paragraphs.html" target="_blank">HTML Paragraphs</a>
    <br><br>

    <h2>Absolute URL Link</h2>
    <a href="https://nbcodeblog.github.io" target="_blank">nbcodeblog</a>

    <h2>HTML Links - Use an Image as a Link</h2>
    <a href="https://nbcodeblog.github.io" target="_blank"><img src="/Assets/logo.png" alt="nbcodeblog logo" width="300" height="275"></a>

    <h2>Link to an Email Address</h2>
    <a href="mailto:someonemailexample@gmail.com" target="_blank">Email Me</a>

    <h2>Button as a Link</h2>
    <button><a class="buttonlink1" href="https://nbcodeblog.github.io" target="_blank">nbcodeblog</a></button>

    <h2>Button as a Link with JavaScript</h2>
    <button onclick="document.location='https://nbcodeblog.github.io'">nbcodeblog</button>

    <h2>Link Titles</h2>
    <a href="https://nbcodeblog.github.io" target="_blank" title="Link">nbcodeblog</a>

    <h2>HTML Link Colors</h2>
</body>
</html>
