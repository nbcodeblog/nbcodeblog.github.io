<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTML Images">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="Nitin Bhardwaj">
    <meta http-equiv="refresh" content="1000">
    <meta name="robots" content="Index, Follow">
    <title>HTML Images</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- HTML Images -->
    <h1>HTML Images</h1>
    <h2>Absolute URL Images</h2>
    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1948&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Nature Image" width="300" height="250">

    <h2>Relative URL Images</h2>
    <img src="/Images/nbcodeblog.jpeg" alt="nbcodeblog Image" width="300" height="250">

    <h2>Animated Images</h2>
    <img src="/Gif's/writing.gif" alt="Pen Gif" width="300" height="250">

    <h2>Image as a Link</h2>
    <a href="https://nbcodeblog.com" target="_blank"><img src="/Images/nbcodeblog.jpeg" alt="nbcodeblog Image" width="300" height="250"></a>

    <h2>Image Maps</h2>
    <img src="/Images/laptop.jpeg" alt="Computer Image" usemap="#image1">
    <map name="image1">
        <area shape="rect" coords="32,43,274,345" href="https://nbcodeblog.com" alt="Computer Image" target="_blank">
        <area shape="rect" coords="289,172,335,245" href="https://nbcodeblog.com" alt="Mobile Image" target="_blank">
        <area shape="circle" coords="338,301,42" href="https://nbcodeblog.com" alt="Cup Image" target="_blank">
    </map>
    <br><br>
    <img src="/Images/frenchfood.jpeg" alt="French Food" usemap="#image2">
    <map name="image2">
        <area shape="poly" coords="180,114,157,117,142,121,130,143,106,158,87,188,63,210,42,254,37,286,41,306,38,325,68,354,86,356,120,337,170,297,191,271,206,232,204,194,206,163,192,141" href="https://nbcodeblog.com" alt="French Food" target="_blank">
    </map>

    <h2>Picture Element</h2>
    <h3>Bandwidth</h3>
    <picture>
        <source media="(min-width: 650px)" srcset="/Images/nbcodeblog.jpeg">
        <source media="(min-width: 465px)" srcset="/Images/laptop.jpeg">
        <img src="/Images/frenchfood.jpeg" alt="French Food">
    </picture>

    <h3>Format Support</h3>
    <picture>
        <source srcset="/Images/nbcodeblog.png">
        <source srcset="/Images/nbcodeblog.jpeg">
        <img src="/Gif's/writing.gif" alt="Girl Writing">
    </picture>

    <h2>Responsive Image</h2>
    <img src="/Images/nbcodeblog.jpeg" alt="nbcodeblog Image" width="100%">
</body>
</html>
