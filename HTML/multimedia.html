<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTML Multimedia">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="Nitin Bhardwaj">
    <meta http-equiv="refresh" content="1000">
    <meta name="robots" content="Index, Follow">
    <title>HTML Multimedia</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- HTML Multimedia -->
    <h1>HTML Multimedia</h1>
    <h2>HTML Video</h2>
    <video width="500" height="300" controls autoplay muted>
        <source src="/Videos/article_370.mp4" type="video/mp4">
    </video>

    <h2>HTML Audio</h2>
    <audio controls autoplay muted>
        <source src="/Audios/taaron_ke_shehar.mp3" type="audio/mp3">
    </audio>

    <h2>HTML Object Element</h2>
    <object data="/Audios/o_khuda.mp3" type="audio/mp3" width="300" height="250"></object>

    <h2>HTML Embed Element</h2>
    <embed src="/Audios/o_khuda.mp3" type="audio/mp3" width="300" height="250">

    <h2>HTML YouTube Videos</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dqSOx9b9ns4?si=vGQJcH-VRuj3DQWQ?autoplay=1&mute=1"></iframe>
    <br><br>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dqSOx9b9ns4?si=vGQJcH-VRuj3DQWQ?playlist=dqSOx9b9ns4?si=vGQJcH-VRuj3DQWQ&loop=1"></iframe>
</body>
</html>
