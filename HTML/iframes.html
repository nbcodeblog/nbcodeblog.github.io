<!DOCTYPE html>
<html lang="en-IN">
<head>

</head>
<body>
    <!-- HTML Iframes -->
    <h1>HTML Iframes</h1>
    <h2>Iframe</h2>
    <iframe src="paragraphs.html" frameborder="0" width="300" height="200" title="Iframe have paragraphs.html file"></iframe>

    <h2>Iframe Target for a Link</h2>
    <iframe src="paragraphs.html" frameborder="0" name="target1" width="300" height="200" title="Iframe target for a link"></iframe>
    <br><br>
    <a href="links.html" target="target1">Links</a>
</body>
</html>
