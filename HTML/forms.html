<!DOCTYPE html>
<html lang="en-IN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTML Forms">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="Nitin Bhardwaj">
    <meta http-equiv="refresh" content="1000">
    <meta name="robots" content="Index, Follow">
    <title>HTML Forms</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- HTML Forms -->
    <h1>HTML Forms</h1>
    <form action="action_page.php" target="_blank" method="post">
        <fieldset>
            <legend>Form 1</legend>
            <label for="fname">First Name :</label>
            <input type="text" name="fname" id="fname" value="Nitin" autofocus>
            <br><br>
            <label for="lname">Last Name :</label>
            <input type="text" name="lname" id="lname" value="Bhardwaj" readonly>
            <br><br>

            <label for="uname">Username :</label>
            <input type="text" name="uname" id="uname">
            <br><br>
            <label for="pwd">Password :</label>
            <input type="password" name="pwd" id="pwd">
            <br><br>

            <label for="email">Email :</label>
            <input type="email" name="email" id="email">
            <br><br>

            <label for="">Gender :</label>
            <input type="radio" name="gender" id="male" checked>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="others">
            <label for="others">Others</label>
            <br><br>

            <label for="">Subjects :</label>
            <input type="checkbox" name="html" id="html" checked>
            <label for="html">HTML</label>
            <input type="checkbox" name="css" id="css">
            <label for="css">CSS</label>
            <input type="checkbox" name="js" id="js">
            <label for="js">JavaScript</label>
            <br><br>

            <label for="col">Favourite Color :</label>
            <input type="color" name="col" id="col">
            <br><br>

            <label for="dob">Date of Birth :</label>
            <input type="date" name="dob" id="dob">
            <br><br>

            <label for="dob">Date of Birth: </label>
            <input type="date" name="dob" id="dob" min="2023-11-30">
            <br><br>

            <label for="dob">Date of Birth :</label>
            <input type="date" name="dob" id="dob" max="1999-11-30">
            <br><br>

            <label for="dob">Date of Birth and Time :</label>
            <input type="datetime-local" name="dob" id="dob">
            <br><br>

            <label for="file">Select File :</label>
            <input type="file" name="file" id="file">
            <br><br>

            <label for="age">Select Age :</label>
            <input type="number" name="age" id="age">
            <br><br>

            <label for="age">Select Age :</label>
            <input type="number" name="age" id="age" min="18" max="30">
            <br><br>

            <label for="age">Select Age :</label>
            <input type="number" name="age" id="age" step="10">
            <br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" name="phone" id="phone" placeholder="12-3456-7890" pattern="[0-9]{2}-[0-9]{4}-[0-9]{4}" required>
            <br><br>

            <label for="lang">Choose Language :</label>
            <select name="lang" id="lang">
                <option value="sanskrit">Sanskrit</option>
                <option value="hindi">Hindi</option>
                <option value="english">English</option>
            </select>
            <br><br>

            <label for="lang">Choose Language :</label>
            <select name="lang" id="lang">
                <option value="sanskrit">Sanskrit</option>
                <option value="hindi" selected>Hindi</option>
                <option value="english">English</option>
            </select>
            <br><br>

            <label for="lang">Choose Language :</label>
            <select name="lang" id="lang" size="2">
                <option value="sanskrit">Sanskrit</option>
                <option value="hindi">Hindi</option>
                <option value="english">English</option>
            </select>
            <br><br>

            <label for="lang">Choose Language :</label>
            <select name="lang" id="lang" size="3" multiple>
                <option value="sanskrit">Sanskrit</option>
                <option value="hindi">Hindi</option>
                <option value="english">English</option>
            </select>
            <br><br>

            <label for="lang">Choose Language :</label>
            <select name="lang" id="lang">
                <optgroup label="India Languages">
                    <option value="sanskrit">Sanskrit</option>
                    <option value="hindi">Hindi</option>
                </optgroup>
                <optgroup label="Central Language">
                    <option value="english">English</option>
                </optgroup>
            </select>
            <br><br>

            <label for="text">Description :</label>
            <textarea name="message" id="text" rows="10" cols="30"></textarea>
            <br><br>

            <input list="browsers" name="browsers">
            <datalist id="browsers">
                <option value="Chrome">
                <option value="Edge">
                <option value="Safari">
                <option value="Firefox">
            </datalist>
            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </fieldset>
    </form>
</body>
</html>
